name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EitaaSharp.slnx

      - name: Build (warnings as errors)
        run: dotnet build EitaaSharp.slnx --no-restore -c Release -warnaserror

      - name: Test
        run: dotnet test EitaaSharp.slnx --no-build -c Release --verbosity normal
