name: Release

# Packs the libraries and pushes them to NuGet when a v* tag is pushed.
# Requires a NUGET_API_KEY repository secret.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: Pack & publish
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EitaaSharp.slnx

      - name: Pack
        run: dotnet pack EitaaSharp.slnx -c Release --no-restore -o artifacts

      - name: Push to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg
